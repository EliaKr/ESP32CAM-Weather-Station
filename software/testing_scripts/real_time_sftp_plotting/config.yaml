ssh:
  host: "IP_ADDRESS"
  port: 22
  username: "username"
  # Prefer leaving this blank and using env var WX_PI_PASSWORD.
  password: ""
  key_filename: ""   # optional

remote:
  csv: "/home/pi/wx_server_deployment/processing/server_log.csv"

ui:
  refresh_seconds: 10
  timeframe_default: "2h"
  timeframes:
    - "5m"
    - "10m"
    - "15m"
    - "30m"
    - "1h"
    - "2h"
    - "4h"
    - "6h"
    - "12h"
    - "1d"
    - "2d"
    - "7d"
